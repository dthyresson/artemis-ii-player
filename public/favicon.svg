<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#000"/>
  <!-- engine nozzle -->
  <polygon points="13,27 19,27 17,22 15,22" fill="#555"/>
  <!-- engine bell -->
  <ellipse cx="16" cy="27" rx="3.5" ry="1.2" fill="#444"/>
  <!-- service module -->
  <rect x="13" y="18" width="6" height="5" rx="1" fill="#888"/>
  <!-- solar panels -->
  <rect x="6" y="19" width="6" height="2" rx="0.5" fill="#1a5fb4"/>
  <rect x="20" y="19" width="6" height="2" rx="0.5" fill="#1a5fb4"/>
  <!-- crew module (cone) -->
  <polygon points="16,8 11,18 21,18" fill="#c0c0c0"/>
  <!-- launch abort tower -->
  <rect x="15.2" y="4" width="1.6" height="5" rx="0.5" fill="#aaa"/>
  <polygon points="16,2 14.5,5 17.5,5" fill="#aaa"/>
  <!-- engine glow -->
  <ellipse cx="16" cy="29" rx="2" ry="1" fill="#FF8C00" opacity="0.8"/>
  <ellipse cx="16" cy="30.5" rx="1.2" ry="0.7" fill="#FC3D21" opacity="0.5"/>
</svg>
